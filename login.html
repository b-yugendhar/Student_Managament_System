<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #eaeaec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }
        form {
          width: 500px;
            margin: 55px auto;
            padding: 50px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background:rgba(200, 200, 200, 0.5);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;    
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #617863;
            color: rgb(244, 238, 238);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .gif-video{
        width:350px;
        display:block;
        border:1px solid #617863;
        border-radius:250px;
        margin:20px auto;
        }
        </style>
</head>
<body>
    <a href="index.html" style="position: absolute; top: 20px; left: 20px; text-decoration: none; color: #373a37; border: 1px solid #617863; padding: 5px 10px; border-radius: 4px; background-color: #bca9a9;">Back to Home</a>
    <form action="dashboard.html">
        <h2>Login</h2>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
    <video autoplay loop class="gif-video">
    <source src="login_animation.mp4" type="video/mp4">
</video>
