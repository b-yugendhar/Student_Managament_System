<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eaeaec;
            display: flex;
            justify-content: center;
        }
        form {
            width: 300px;
            margin: 55px auto;
            padding: 50px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: rgba(200, 200, 200, 0.5);
        }
        h2{
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;    
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #617863;
            color: rgb(244, 238, 238);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
   
    
    <form action="viewstudents.html" >
        <h2>Edit Student</h2>
        <label for="studentid">Student ID:</label>
        <input type="text" id="studentid" name="studentid"><br><br>
        <label for="studentname">Student Name:</label>
        <input type="text" id="studentname" name="studentname"><br><br>
        <label for="studentemail">Student Email:</label>
        <input type="email" id="studentemail" name="studentemail"><br><br>
        <label for="course">Course:</label>
        <input type="text" id="course" name="course"><br><br>
        <label for="cgpa">CGPA:</label>
        <input type="text" id="cgpa" name="cgpa"><br><br>
        <input type="submit" value="Update Student">
</body>
</html>
